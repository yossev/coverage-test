# .github/workflows/coverage.yml
name: Coverage gate

on:
  pull_request:
    branches: [main, master]

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: base

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: head

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run tests on base branch
        working-directory: base
        run: |
          dotnet test \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=$GITHUB_WORKSPACE/base-coverage.cobertura.xml
      - name: Run tests on PR branch
        working-directory: head
        run: |
          dotnet test \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=$GITHUB_WORKSPACE/pr-coverage.cobertura.xml
      - name: Install pycobertura
        run: pip install pycobertura

      - name: Check diff coverage
        id: diff_coverage
        run: |
          # Adding --no-source prevents the FileNotFoundError
          OUTPUT=$(pycobertura diff --no-source base-coverage.cobertura.xml pr-coverage.cobertura.xml 2>&1) || true
          echo "$OUTPUT"

          COVERED=$(echo "$OUTPUT" | grep -oP '(\d+(\.\d+)?)(?=%)' | tail -1)

          if [ -z "$COVERED" ]; then
            echo "Could not parse coverage percentage, skipping threshold check"
            echo "diff_failed=false" >> $GITHUB_OUTPUT
            echo "coverage_percent=N/A" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "coverage_percent=$COVERED" >> $GITHUB_OUTPUT
          PERCENT_INT=$(echo "$COVERED" | cut -d. -f1)

          if [ "$PERCENT_INT" -lt 80 ]; then
            echo "::warning::New code coverage is $COVERED% — below the 80% threshold"
            echo "diff_failed=true" >> $GITHUB_OUTPUT
          else
            echo "New code coverage is $COVERED% — OK"
            echo "diff_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment
        if: steps.diff_coverage.outputs.diff_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let diff;
            try {
              // We use a try/catch because pycobertura returns an error code
              // if coverage decreased, which causes execSync to throw.
              diff = execSync('pycobertura diff --no-source base-coverage.cobertura.xml pr-coverage.cobertura.xml').toString();
            } catch (error) {
              // If it "fails", the output (the table) is usually in error.stdout
              diff = error.stdout ? error.stdout.toString() : error.message;
            }

            const percent = '${{ steps.diff_coverage.outputs.coverage_percent }}';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ **New code coverage is ${percent}% — below the 80% threshold**\n\n\`\`\`\n${diff}\n\`\`\``
            })